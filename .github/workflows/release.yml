name: Release

on:
  push:
    tags:
      - 'v*'

# Ensure only one release runs at a time
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Run tests once before building on all platforms
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  release:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Build and publish. electron-builder picks the right targets
      # based on the --mac/--win/--linux flag and the current OS.
      #
      # macOS signing: electron-builder reads CSC_LINK (base64-encoded
      # .p12 certificate) and CSC_KEY_PASSWORD directly, creating a
      # temporary keychain internally. No manual keychain setup needed.
      #
      # macOS notarization: scripts/notarize.js reads APPLE_ID,
      # APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID. If any are
      # missing, it skips notarization gracefully.
      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing — electron-builder handles keychain creation
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.MAC_CERTIFICATE_BASE64 || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.MAC_CERTIFICATE_PASSWORD || '' }}
          # macOS notarization — read by scripts/notarize.js
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}
        run: npx tsc && npx vite build && npx electron-builder --${{ matrix.platform }} --publish always

      # Verify the macOS build was actually signed. This step fails
      # the build if codesign reports the app is unsigned, so we don't
      # silently ship unsigned artifacts.
      - name: Verify macOS code signature
        if: matrix.platform == 'mac'
        run: |
          APP=$(find release -name "*.app" -maxdepth 2 | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found in release/"
            exit 1
          fi
          echo "Checking signature on $APP"
          codesign --verify --deep --strict "$APP" 2>&1
          echo "Signature verified OK"
          codesign -dvvv "$APP" 2>&1 | grep "Authority"
