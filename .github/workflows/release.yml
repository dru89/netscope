name: Release

on:
  push:
    tags:
      - 'v*'

# Ensure only one release runs at a time
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Run tests once before building on all platforms
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  # Build on all three platforms without publishing. Artifacts are
  # uploaded to the workflow run so the publish job can download them.
  build:
    needs: test
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Build without publishing (--publish never). Each platform
      # produces its artifacts in release/.
      #
      # macOS signing: electron-builder reads CSC_LINK (base64-encoded
      # .p12 certificate) and CSC_KEY_PASSWORD directly, creating a
      # temporary keychain internally. No manual keychain setup needed.
      #
      # macOS notarization: scripts/notarize.js reads APPLE_ID,
      # APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID. If any are
      # missing, it skips notarization gracefully.
      - name: Build (macOS)
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx tsc && npx vite build && npx electron-builder --mac --publish never

      - name: Build (Windows/Linux)
        if: matrix.platform != 'mac'
        run: npx tsc && npx vite build && npx electron-builder --${{ matrix.platform }} --publish never

      # Verify the macOS build was actually signed
      - name: Verify macOS code signature
        if: matrix.platform == 'mac'
        run: |
          APP=$(find release -name "*.app" -maxdepth 2 | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found in release/"
            exit 1
          fi
          echo "Checking signature on $APP"
          codesign --verify --deep --strict "$APP" 2>&1
          echo "Signature verified OK"
          codesign -dvvv "$APP" 2>&1 | grep "Authority"

      # Upload build artifacts for the publish job. Exclude the
      # unpacked app directories (mac-arm64/, mac-x64/, linux-unpacked/,
      # win-unpacked/) — only upload the distributable files.
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.yaml
          if-no-files-found: error
          retention-days: 1

  # Publish all artifacts to a single GitHub Release. This job only
  # runs if all three platform builds succeeded.
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List release artifacts
        run: ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
